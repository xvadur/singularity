<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StatsChat AI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'dashboard-bg': '#0B1D30',
              'panel-border': '#4F7CAC',
              'sidebar-purple': '#8B5CF6',
              'stat-green': '#10B981',
              'timeline-red': '#EF4444',
              'calendar-brown': '#92400E',
              'input-gray': '#8D8D8D',
            }
          }
        }
      }
    </script>
    <style>
      /* Custom scrollbar for a cleaner look */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0B1D30;

      ::-webkit-scrollbar-thumb {
        background: #4F7CAC; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #6096d1; 
      }
    </style>
